name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&theme=react&bg_color=1f232a&title_color=61dafb&icon_color=61dafb&border_color=ffffff
          path: profile/stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate top langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&langs_count=8&layout=compact&theme=react&bg_color=1f232a&title_color=61dafb&icon_color=ffffff&border_color=ffffff&hide=JavaScript,CSS,HTML,Makefile,Scilab,Haml,SCSS,Cmake,Sass,Vue
          path: profile/top-langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
